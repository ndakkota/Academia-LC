<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#f39c12">
  <meta charset="UTF-8">
  <title>TREINO GVT</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background: url('academia.jpeg') no-repeat center center fixed;
      background-size: cover;
      color: #fff;
      position: relative;
    }
    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.7);
      z-index: -1;
    }
    h1 { text-align: center; margin-bottom: 20px; color: #f39c12; }
    .controls { text-align: center; margin-bottom: 20px; }
    input, button {
      margin: 5px; padding: 10px; border-radius: 12px; font-size: 16px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(34,34,34,0.6); color: #f39c12;
      backdrop-filter: blur(8px); transition: all 0.3s ease;
    }
    input:hover, button:hover { background: rgba(255,255,255,0.2); transform: scale(1.05); }
    .exercise {
      background: rgba(34,34,34,0.6); margin-bottom: 20px; padding: 15px;
      border-radius: 15px; box-shadow: 0 8px 16px rgba(0,0,0,0.4); backdrop-filter: blur(6px);
    }
    .exercise h3 { margin: 0; color: #f39c12; }
    .series { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
    .series input { display: none; }
    .series label {
      background: rgba(255,255,255,0.1); padding: 10px; border-radius: 8px;
      flex: 1 1 30%; text-align: center; cursor: pointer; font-size: 14px;
      backdrop-filter: blur(6px); transition: all 0.3s ease;
    }
    .series label span::before { content: "⚪"; font-size: 18px; margin-right: 6px; color: #ccc; }
    .series input:checked + span::before { content: "✅"; color: #2ecc71; font-weight: bold; margin-right: 6px; }
    .series input:checked + span { color: #2ecc71; font-weight: bold; }
    .counter { margin-top: 10px; font-size: 14px; color: #bbb; }
    button {
      display: inline-block; margin: 10px; padding: 12px 20px;
      background: rgba(255,255,255,0.1); color: #fff;
      border: 1px solid rgba(255,255,255,0.2); border-radius: 12px;
      font-size: 16px; cursor: pointer; backdrop-filter: blur(8px); transition: all 0.3s ease;
    }
    button:hover { background: rgba(255,255,255,0.2); transform: scale(1.05); }
    .popup {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.7); justify-content: center; align-items: center;
    }
    .popup-content {
      background: rgba(34,34,34,0.6); padding: 20px; border-radius: 15px;
      text-align: center; color: #fff; width: 80%; max-width: 300px;
      box-shadow: 0 8px 16px rgba(0,0,0,0.4); backdrop-filter: blur(10px);
    }
    .popup-content .icon { font-size: 40px; margin-bottom: 10px; color: #f39c12; }
  </style>
</head>
<body>
  <h1>STRONG MAN 🏋️</h1>

  <div class="controls">
    <input type="text" id="exerciseName" placeholder="Digite o nome do exercício">
    <input type="number" id="seriesInput" min="1" max="20" value="1" placeholder="Nº de séries">
    <button id="addExerciseBtn">Adicionar Exercício</button>
  </div>


  <div id="exercises"></div>
<div class="controls">
  <button id="resetBtn">Resetar Treino</button>
</div>

  <div id="confirmPopup" class="popup">
    <div class="popup-content">
      <div class="icon">🏋️</div>
      <p>Tem certeza que deseja resetar todo o treino?</p>
      <button id="confirmYes">Sim</button>
      <button id="confirmNo">Cancelar</button>
    </div>
  </div>

  <script>
    const container = document.getElementById("exercises");
    let savedProgress = JSON.parse(localStorage.getItem("treinoProgress")) || {};

    if (savedProgress.exercises) {
      savedProgress.exercises.forEach(ex => createExercise(ex.name, ex.series));
    }

    function createExercise(name, series) {
      const div = document.createElement("div");
      div.className = "exercise";

      const title = document.createElement("h3");
      title.textContent = name;
      div.appendChild(title);

      const seriesDiv = document.createElement("div");
      seriesDiv.className = "series";

      for (let i = 1; i <= series; i++) {
        const label = document.createElement("label");
        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.id = `${name}-serie${i}`;

        if (savedProgress[checkbox.id]) {
          checkbox.checked = true;
        }

        const span = document.createElement("span");
        span.textContent = `Série ${i}`;

        label.appendChild(checkbox);
        label.appendChild(span);
        seriesDiv.appendChild(label);

        checkbox.addEventListener("change", () => {
          updateCounter(div, series);
          saveProgress(checkbox.id, checkbox.checked);
        });
      }

      div.appendChild(seriesDiv);

      const counter = document.createElement("div");
      counter.className = "counter";
      div.appendChild(counter);

      container.appendChild(div);

      updateCounter(div, series);
      saveExerciseList();
    }

    function updateCounter(exerciseDiv, totalSeries) {
      const checked = exerciseDiv.querySelectorAll("input:checked").length;
      const counter = exerciseDiv.querySelector(".counter");
      counter.textContent = `${checked}/${totalSeries} séries concluídas`;
    }

    function saveProgress(id, checked) {
      savedProgress[id] = checked;
      localStorage.setItem("treinoProgress", JSON.stringify(savedProgress));
    }

    function saveExerciseList() {
      const exercises = [];
      document.querySelectorAll(".exercise h3").forEach(title => {
        const name = title.textContent;
        const series = title.parentElement.querySelectorAll("input").length;
        exercises.push({ name, series });
      });
      savedProgress.exercises = exercises;
      localStorage.setItem("treinoProgress", JSON.stringify(savedProgress));
    }

    document.getElementById("addExerciseBtn").addEventListener("click", () => {
      const exerciseName = document.getElementById("exerciseName").value.trim();
      const seriesNumber = parseInt(document.getElementById("seriesInput").value);
      if (exerciseName && seriesNumber > 0) {
        createExercise(exerciseName, seriesNumber);
        document.getElementById("exerciseName").value = "";
      }
    });

    const resetBtn = document.getElementById("resetBtn");
    const popup = document.getElementById("confirmPopup");
    const confirmYes = document.getElementById("confirmYes");
    const confirmNo = document.getElementById("confirmNo");

    resetBtn.addEventListener("click", () => {
      popup.style.display = "flex";
    });

    confirmNo.addEventListener("click", () => {
      popup.style.display = "none";
    });

    confirmYes.addEventListener("click", () => {
      localStorage.removeItem("treinoProgress");
      container.innerHTML = "";
      popup.style.display = "none";
    });
  </script>
  <script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js");
  }
</script>
</body>
</html>
